<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal | IITM Cyber Security</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/modern_dashboard_styles.css" rel="stylesheet">
    <style>
        body {
            background-color: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            max-width: 900px;
            width: 100%;
            background: white;
            overflow: hidden;
            display: flex;
        }
        .login-left {
            flex: 1;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .login-right {
            flex: 1;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: white;
        }
        .brand-logo {
            width: 60px;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>

<div class="login-card smooth-shadow rounded-xl animate-fade-in">
    <div class="login-left">
        <div class="mb-4">
            <img src="/static/img/iitm_logo.png" alt="IITM" class="brand-logo">
            <h3 class="fw-bold text-dark">Client Portal</h3>
            <p class="text-muted">Sign in to request security assessments and manage compliance.</p>
        </div>
        
        <form id="loginForm">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" placeholder="Username / Email" required>
                <label for="username" class="text-muted">Username / Email</label>
            </div>
            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="password" placeholder="Password" required>
                <label for="password" class="text-muted">Password</label>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 mb-3 py-3 fw-bold shadow-sm">Secure Login</button>
            <div id="errorMsg" class="alert alert-danger small text-center py-2" style="display:none;"></div>
        </form>
    </div>
    <div class="login-right bg-gradient-brand d-none d-md-flex">
        <h4 class="fw-bold mb-3 text-white">P.G. Senapathy Centre For Computing Resources</h4>
        <p class="text-light mb-4">Cyber Security & Audit Team</p>
        <ul class="list-unstyled text-white small">
            <li class="mb-2"><i class="fas fa-bug me-2 text-dange"></i>Vulnerability Assessment</li>
            <li class="mb-2"><i class="fas fa-file-shield me-2 text-primary"></i>Compliance Audits</li>
            <li class="mb-2"><i class="fas fa-check-circle me-2"></i>Network Security Monitoring</li>
        </ul>
    </div>
</div>

<script>
// Enter Key Navigation
document.getElementById('username').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('password').focus();
    }
});

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const err = document.getElementById('errorMsg');
    
    try {
        const res = await fetch('/token', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: user, password: pass})
        });
        const data = await res.json();
        
        if (res.ok) {
            if(data.user_details.role === 'admin') {
                err.innerText = "Admins please use SOC Login.";
                err.style.display = 'block';
                return;
            }
            localStorage.setItem('iitm_token', data.access_token);
            localStorage.setItem('iitm_user', JSON.stringify(data.user_details));
            window.location.href = '/static/user_dashboard.html';
        } else {
            err.innerText = data.detail || "Authentication Failed";
            err.style.display = 'block';
        }
    } catch (e) {
        err.innerText = "Connection Error";
        err.style.display = 'block';
    }
});
</script>
</body>
</html>
