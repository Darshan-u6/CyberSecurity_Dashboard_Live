<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Gateway | IITM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8fafc;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .gateway-card {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .role-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            text-decoration: none;
            color: #1e293b;
            font-weight: 600;
            transition: all 0.2s;
        }
        .role-btn:hover {
            border-color: #3b82f6;
            background: #eff6ff;
            color: #2563eb;
        }
    </style>
</head>
<body>

<div class="gateway-card">
    <img src="/static/img/iitm_logo.png" alt="IITM" style="width: 60px; margin-bottom: 1.5rem;">
    <h4 class="fw-bold mb-1">P.G. Senapathy Center For Computing Resources</h4>
    <p class="text-muted mb-4">Cyber Security & Audit</p>
    
    <div class="d-grid gap-3">
        <a href="/static/user_login.html" class="role-btn">
            <div class="d-flex align-items-center justify-content-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                Client Portal Access
            </div>
            <small class="text-muted fw-normal">For Departments & Faculty</small>
        </a>
        
        <a href="/static/admin_login.html" class="role-btn admin">
            <div class="d-flex align-items-center justify-content-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                Admin Portal Access
            </div>
            <small class="text-muted fw-normal" style="color: inherit; opacity: 0.7;">Authorized Personnel Only</small>
        </a>
    </div>
</div>

</body>
</html>
