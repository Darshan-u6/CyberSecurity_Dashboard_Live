<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Command | IITM Cyber Security</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/modern_dashboard_styles.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            overflow: hidden;
            display: flex;
        }
        .login-left {
            flex: 1;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .login-right {
            flex: 1;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 4rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: white;
        }
        .brand-logo {
            width: 60px;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-left">
        <div class="mb-4">
            <img src="/static/img/iitm_logo.png" alt="IITM" class="brand-logo">
            <h3 class="fw-bold text-dark">Admin Portal</h3>
            <p class="text-muted">Restricted Access. Authorized personnel only.</p>
        </div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label text-secondary small fw-bold">Username / Email</label>
                <input type="text" class="form-control form-control-lg bg-light border-0" id="username" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary small fw-bold">Password</label>
                <input type="password" class="form-control form-control-lg bg-light border-0" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">Login</button>
            <div id="errorMsg" class="alert alert-danger small text-center py-2" style="display:none;"></div>
        </form>
    </div>
    <div class="login-right d-none d-md-flex">
        <h4 class="fw-bold mb-3 text-white">P.G. Senapathy Centre For Computing Resources</h4>
        <p class="text-light mb-4">Cyber Security & Audit</p>
        <ul class="list-unstyled text-white small">
            <li class="mb-2"><i class="fas fa-shield-alt me-2"></i>Real-time Threat Monitoring</li>
            <li class="mb-2"><i class="fas fa-network-wired me-2"></i>Infrastructure Defense</li>
            <li class="mb-2"><i class="fas fa-bug me-2"></i>Incident Response</li>
        </ul>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const err = document.getElementById('errorMsg');
    
    try {
        const res = await fetch('/token', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: user, password: pass})
        });
        const data = await res.json();
        
        if (res.ok) {
            if(data.user_details.role !== 'admin') {
                err.innerText = "Insufficient Privileges.";
                err.style.display = 'block';
                return;
            }
            localStorage.setItem('iitm_admin_token', data.access_token);
            localStorage.setItem('iitm_admin_user', JSON.stringify(data.user_details));
            window.location.href = '/static/index.html';
        } else {
            err.innerText = "Access Denied";
            err.style.display = 'block';
        }
    } catch (e) {
        err.innerText = "System Error";
        err.style.display = 'block';
    }
});
</script>
</body>
</html>
